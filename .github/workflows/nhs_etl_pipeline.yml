name: NHS ETL Pipeline

on:
  schedule:
    # Runs at midnight UTC on the 15th of every month
    - cron: "0 0 15 * *"
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  extract:
    name: Extract — Download Latest NHS Appointments CSV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r data_pipeline/requirements.txt

      - name: Run scraper
        run: python data_pipeline/scrape_appointments.py

