name: NHS ETL Pipeline

on:
  schedule:
    # Runs at midnight UTC on the 15th of every month
    - cron: "0 0 15 * *"
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  etl:
    name: Extract, Transform & Load NHS GP Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r data_pipeline/requirements.txt

      # --- Extract -----------------------------------------------------------

      - name: Extract — Appointments in General Practice
        run: python data_pipeline/scrape_appointments.py

      - name: Extract — Patients Registered at a GP Practice
        run: python data_pipeline/scrape_gp_patients.py

      - name: Extract — Quality and Outcomes Framework (QOF)
        run: python data_pipeline/scrape_qof.py

      # --- Transform ---------------------------------------------------------

      - name: Transform — Join datasets, cluster practices, compute metrics
        run: python data_pipeline/transform_data.py

      # --- Load --------------------------------------------------------------

      - name: Load — Commit output data to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_pipeline/output/practice_data.json
          git diff --cached --quiet || git commit -m "chore: update practice data [skip ci]"
          git push
